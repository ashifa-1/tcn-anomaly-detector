version: "3.9"

services:
  app:
    build: .
    container_name: tcn-anomaly-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3